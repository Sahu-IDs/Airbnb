apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: airbnb-hpa
  namespace: airbnb
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: airbnb-app
  minReplicas: 2               # Always keep at least 2 pods running
  maxReplicas: 5               # Scale up to 5 pods under heavy load
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up if CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # Scale up if Memory > 80%
